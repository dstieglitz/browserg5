  grad.addColorStop(0, "#23262b"); grad.addColorStop(1, "#0c0e10");
  rrect(x, y, w, h, r); ctx.fillStyle = grad; ctx.fill();
  rrect(x, y, w, h, r); ctx.lineWidth = 2; ctx.strokeStyle = "#5c6066"; ctx.stroke();
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillStyle = "#fff"; ctx.font = `600 ${Math.round(h * 0.23)}px ${FONT}`;
  ctx.fillText(EDIT_TITLE[f] || "Select", x + w / 2, y + h * 0.31);
  ctx.fillStyle = "#2fd0e8"; ctx.font = `700 ${Math.round(h * 0.42)}px ${FONT}`;
  ctx.fillText(val, x + w / 2, y + h * 0.70);
  ctx.restore();
  hit(x, y, w, h, ["dlgW", "dlgH"]);
}

// Testing aid: outline the unit currently under the mouse (never shows on a
// touch device since there is no mousemove).
function drawHover(reg) {
  ctx.strokeStyle = "rgba(25,211,255,0.45)"; ctx.lineWidth = 2;
  ctx.strokeRect(reg.x + 1, reg.y + 1, reg.w - 2, reg.h - 2);
}

// Persistent focus indicator: a thin cyan border on the unit the IFR-1 drives.
// Hugs the very edge (in the margin) so it never overlaps an instrument reading.
function drawFocus() {
  if (units.length < 2) return;        // nothing to disambiguate with one unit
  const r = unitRegion(focusIdx);
  ctx.save();
  ctx.strokeStyle = "rgba(25,211,255,0.6)"; ctx.lineWidth = 2;
  rrect(r.x + 1.5, r.y + 1.5, r.w - 3, r.h - 3, 5); ctx.stroke();
  ctx.restore();
}

// ---- developer style panel (press D to toggle, or open with ?dev) ---------
// Live-edit every STYLE value; changes apply immediately and persist in
// localStorage. "Copy JSON" copies the current values (also logged to console)
// so they can be baked in as new defaults.
(function devPanel() {
  const p = document.createElement("div");
  p.style.cssText = "position:fixed;top:0;left:0;max-height:96vh;overflow:auto;z-index:50;"
    + "background:rgba(18,18,22,0.95);color:#dfe3e6;font:12px ui-monospace,Menlo,monospace;"
    + "padding:0 10px 8px;width:248px;display:none;border:1px solid #444;border-radius:4px;";
  let rows = `<div id="g5Drag" style="cursor:move;user-select:none;margin:0 -10px 6px;`
    + `padding:6px 10px;background:#2a2d33;border-radius:3px 3px 0 0">G5 STYLE — drag · D toggles</div>`;
  for (const k in STYLE)
    rows += `<label data-k="${k}" style="display:flex;justify-content:space-between;align-items:center;gap:6px;margin:3px 0;padding:0 2px;border-radius:2px">`
      + `<span>${k}</span><input data-k="${k}" type="number" step="1" value="${STYLE[k]}" `
      + `style="width:66px;background:#000;color:#19d3ff;border:1px solid #555"></label>`;
  rows += `<div style="margin-top:8px;display:flex;gap:6px">`
    + `<button id="g5Reset" style="flex:1">Reset</button>`
    + `<button id="g5Copy" style="flex:1">Copy JSON</button></div>`
    + `<div id="g5Msg" style="opacity:.7;margin-top:6px;min-height:14px"></div>`
    + `<textarea id="g5Json" readonly style="width:100%;height:130px;display:none;`
    + `margin-top:4px;background:#000;color:#9fe6ff;border:1px solid #555;font:11px ui-monospace,monospace"></textarea>`;
  p.innerHTML = rows;
  document.body.appendChild(p);
  devPanelEl = p;
  // initial position (restore saved, else top-right)
  let pos = null; try { pos = JSON.parse(localStorage.getItem("g5panelpos")); } catch (_) {}
  p.style.left = (pos ? pos.x : Math.max(0, window.innerWidth - 258)) + "px";
  p.style.top  = (pos ? pos.y : 0) + "px";
  // drag by the header
  let drag = null;
  p.querySelector("#g5Drag").addEventListener("mousedown", (e) => {
    drag = { x: e.clientX - p.offsetLeft, y: e.clientY - p.offsetTop }; e.preventDefault();
  });
  addEventListener("mousemove", (e) => {
    if (!drag) return;
    p.style.left = (e.clientX - drag.x) + "px"; p.style.top = (e.clientY - drag.y) + "px";
  });
  addEventListener("mouseup", () => {
    if (drag) localStorage.setItem("g5panelpos", JSON.stringify({ x: p.offsetLeft, y: p.offsetTop }));
    drag = null;
  });
  const save = () => { const d = {}; for (const k in STYLE) if (STYLE[k] !== STYLE_DEFAULTS[k]) d[k] = STYLE[k];
    localStorage.setItem("g5style", JSON.stringify(d)); };
  p.addEventListener("input", (e) => { const k = e.target.dataset.k; if (!k) return;
    const v = parseFloat(e.target.value); if (!isNaN(v)) { STYLE[k] = v; save(); } });
  p.querySelector("#g5Reset").onclick = () => { for (const k in STYLE_DEFAULTS) STYLE[k] = STYLE_DEFAULTS[k];
    localStorage.removeItem("g5style"); p.querySelectorAll("input[data-k]").forEach(i => i.value = STYLE[i.dataset.k]); };
  p.querySelector("#g5Copy").onclick = () => {
    const json = JSON.stringify(STYLE, null, 2); console.log(json);
    const ta = p.querySelector("#g5Json");
    ta.style.display = "block"; ta.value = json; ta.focus(); ta.select();
    let ok = false; try { ok = document.execCommand("copy"); } catch (_) {}
    if (!ok && navigator.clipboard) navigator.clipboard.writeText(json).then(() => {}).catch(() => {});
    p.querySelector("#g5Msg").textContent = ok ? "copied — also shown below" : "select text below & ⌘C (also in console)";
  };
  const setVis = (v) => { p.style.display = v ? "block" : "none"; devFrozen = v; if (!v) devHighlight(null); };
  addEventListener("keydown", (e) => {
    if ((e.key === "d" || e.key === "D") && !e.metaKey && !e.ctrlKey) {
      if (e.target && e.target.blur) e.target.blur();   // release a focused field so D always works
      setVis(p.style.display === "none");
    }
  });
  if (/[?&]dev/.test(location.search)) setVis(true);
})();

// ---- display fit menu (opened by a screen tap) -----------------------------
// Each edge has two buttons that move that edge of the drawable viewport in/out,
// so the image can be sized to clear bezels/notches. OK in the center closes.
function nudgeEdge(edge, grow) {
  const step = 6, d = grow ? -step : step;
  const lim = (edge === "top" || edge === "bottom")
    ? Math.max(0, Math.floor(RH / 2) - 60) : Math.max(0, Math.floor(RW / 2) - 60);
  cfg.inset[edge] = clamp(cfg.inset[edge] + d, 0, lim);
  layoutViewport(); saveCfg();
}
(function () {
  const style = document.createElement("style");
  style.textContent =
    "#cfg .eb{width:54px;height:44px;border-radius:9px;border:1px solid #3a3f48;background:#1d2026;color:#e8eaed;font:600 20px " + FONT + ";touch-action:none;}" +
    "#cfg .eb:active{background:#0d3b66;border-color:#19d3ff;}" +
    "#cfg .grp{display:flex;gap:8px;}" +
    "#cfg #cfgOK{width:88px;height:88px;border-radius:50%;border:2px solid #19d3ff;background:#0d3b66;color:#fff;font:700 18px " + FONT + ";}";
  document.head.appendChild(style);

  const menu = document.createElement("div");
  menu.id = "cfg";
  menu.style.cssText = "position:fixed;inset:0;z-index:20;display:none;background:rgba(0,0,0,0.5);" +
    "align-items:center;justify-content:center;";
  menu.innerHTML =
    '<div style="position:fixed;top:22vh;left:0;right:0;padding:0 8vw;text-align:center;color:#cfd3d8;' +
      'font:600 15px ' + FONT + ';letter-spacing:0.03em;line-height:1.4;">Size the display to clear your device’s bezels — OK when done</div>' +
    '<div style="display:grid;grid-template-columns:auto auto auto;grid-template-rows:auto auto auto;' +
      'gap:20px;align-items:center;justify-items:center;">' +
      '<div></div><div class="grp" id="gTop"></div><div></div>' +
      '<div class="grp" id="gLeft"></div><button id="cfgOK">OK</button><div class="grp" id="gRight"></div>' +
      '<div></div><div class="grp" id="gBottom"></div><div></div>' +
    '</div>';
  document.body.appendChild(menu);

  const g = (id) => menu.querySelector(id);
  function holdRepeat(btn, fn) {
    let iv = null;
    const stop = () => { if (iv) { clearInterval(iv); iv = null; } };
    btn.addEventListener("pointerdown", (e) => { e.preventDefault(); fn(); stop(); iv = setInterval(fn, 90); });
    ["pointerup", "pointerleave", "pointercancel"].forEach((ev) => btn.addEventListener(ev, stop));
  }
  function addBtn(group, label, edge, grow) {
    const b = document.createElement("button");
    b.className = "eb"; b.textContent = label;
    holdRepeat(b, () => nudgeEdge(edge, grow));
    group.appendChild(b);
  }
  // outward arrow = grow toward the screen edge; inward arrow = shrink
  addBtn(g("#gTop"),    "▲", "top",    true);  addBtn(g("#gTop"),    "▼", "top",    false);
  addBtn(g("#gBottom"), "▲", "bottom", false); addBtn(g("#gBottom"), "▼", "bottom", true);
  addBtn(g("#gLeft"),   "◀", "left",   true);  addBtn(g("#gLeft"),   "▶", "left",   false);
  addBtn(g("#gRight"),  "◀", "right",  false); addBtn(g("#gRight"),  "▶", "right",  true);

  function close() { menu.style.display = "none"; cfgShown = false; }
  g("#cfgOK").addEventListener("click", close);
  menu.addEventListener("click", (e) => { if (e.target === menu) close(); });   // tap backdrop closes
  openCfg = () => { menu.style.display = "flex"; cfgShown = true; };
})();

// ---- debug overlay (press G): live raw stream values -----------------------
let dbgOn = false, dbgEl = null;
(function () {
  dbgEl = document.createElement("div");
  dbgEl.id = "dbg";
  dbgEl.style.cssText = "position:fixed;top:0;left:0;z-index:30;display:none;pointer-events:none;" +
    "font:11px/1.45 ui-monospace,Menlo,Consolas,monospace;color:#cfeecf;background:rgba(0,0,0,0.82);" +
    "padding:7px 10px;white-space:pre;max-width:96vw;border:1px solid #2a2e34;border-radius:0 0 8px 0;";
  document.body.appendChild(dbgEl);
  addEventListener("keydown", (e) => {
    if ((e.key === "g" || e.key === "G") && !e.metaKey && !e.ctrlKey &&
        !/^(INPUT|TEXTAREA)$/.test((e.target || {}).tagName)) {
      dbgOn = !dbgOn; dbgEl.style.display = dbgOn ? "block" : "none";
    }
  });
})();
const _dbgFmt = (v) => (typeof v === "number" ? (Number.isInteger(v) ? String(v) : v.toFixed(2)) : String(v));
function updateDbg() {
  const age = Math.round(performance.now() - lastData);
  const scale = ["ENR", "TERM", "APR"][Math.round(target.cdiscale)] || "?";
  const ov = Object.keys(override).filter((k) => override[k]).join(",") || "none";
  const hdr = [
    `STREAM  live=${target.live}  age=${age}ms  noData=${noData}`,
    `MODE=${MODE}   ` + units.map((u) => `${u.id.replace("_G5", "")}:${u.page}/${u.ui.mode}`).join("   "),
    `navsrc ${_dbgFmt(target.navsrc)}=${navInfo(target.navsrc).l}   cdiscale=${scale}   tofrom=${_dbgFmt(target.tofrom)}   vshow=${_dbgFmt(target.vshow)}`,
    `overrides: ${ov}`,
  ];
  const cells = Object.keys(target).filter((k) => k !== "live")
    .map((k) => `${k}=${_dbgFmt(target[k])}`.padEnd(15));
  const rows = [];
  for (let i = 0; i < cells.length; i += 4) rows.push(cells.slice(i, i + 4).join(" "));
  dbgEl.textContent = hdr.join("\n") + "\n" + "─".repeat(63) + "\n" + rows.join("\n");
}

// ---- wake lock + start -----------------------------------------------------
let wakeLock = null;
async function keepAwake() { try { if ("wakeLock" in navigator) wakeLock = await navigator.wakeLock.request("screen"); } catch(_){} }
function applyKeepAwake() {
  if (cfg.keepAwake) keepAwake();
  else if (wakeLock) { wakeLock.release().catch(() => {}); wakeLock = null; }
}
document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible") applyKeepAwake(); });
function start() {
  document.getElementById("tap").style.display = "none";
  resize(); applyKeepAwake(); connect();
  // if (cvs.requestFullscreen) cvs.requestFullscreen().catch(()=>{});  // disabled for now
  requestAnimationFrame(frame);
}
document.getElementById("tap").addEventListener("click", start);
if (window.navigator.standalone === true) start();
if (/[?&]auto/.test(location.search)) start();
</script>
