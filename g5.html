<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="G5">
<meta name="theme-color" content="#000000">
<title>G5</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  body { position: fixed; inset: 0; touch-action: none; }
  #g5 { display: block; width: 100vw; height: 100vh; }
  #tap {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.85); color: #fff; font: 600 5vw/1.4 -apple-system, system-ui, sans-serif;
    text-align: center; z-index: 10;
  }
  #nofly {
    position: absolute; top: 4vh; left: 0; right: 0; text-align: center;
    color: #ffc400; font-weight: 700; font-size: 4vw; letter-spacing: 0.12em;
  }
  .tapmsg { display: block; max-width: 80%; text-align: center; }
  .hint { display:block; margin-top: 3vh; font-size: 3.4vw; opacity: 0.7; font-weight: 400; }
</style>
</head>
<body>
<canvas id="g5"></canvas>
<div id="tap">
  <div id="nofly">NOT FOR NAVIGATION</div>
  <span class="tapmsg">Tap to start G5
    <span class="hint">For true fullscreen: Share → Add to Home Screen, then launch from the icon. Keeps the screen awake while running.</span>
  </span>
</div>
<script>
"use strict";

const FONT = "-apple-system, SF Pro Display, system-ui, Roboto, sans-serif";

// ---- live state (target = from sim, disp = smoothed for display) ----------
const target = { pitch:0, roll:0, ias:0, alt:0, vsi:0, hdg:0, slip:0, baro:29.92, gs:0, turn:0, hdgbug:0, altsel:0, trk:0, crs:0, cdi:0, tofrom:0, dist:0, brg:0, vdef:0, vshow:0, fdpitch:0, fdroll:0, apmode:0, live:false };
const disp   = { pitch:0, roll:0, ias:0, alt:0, vsi:0, hdg:0, slip:0, baro:29.92, gs:0, turn:0, hdgbug:0, altsel:0, trk:0, crs:0, cdi:0, tofrom:0, dist:0, brg:0, vdef:0, fdpitch:0, fdroll:0 };
let lastData = 0;

// Airspeed color ranges + Vspeed bugs (aircraft-specific; defaults ~ light single).
// vs0=bottom of white, vs1=bottom of green, vfe=top of white, vno=top of green,
// vne=red line. Tune per airframe.
const ASI = {
  vs0: 40, vs1: 48, vfe: 85, vno: 125, vne: 160,
  vspeeds: [ { l: "R", v: 55 }, { l: "X", v: 62 }, { l: "Y", v: 76 } ],
};
let asiTrend = 0, prevIas = 0;   // predicted airspeed change over next 6 s

// display mode: ?mode=pfd | hsi | both  (default both = PFD on top, HSI below)
const MODE = (location.search.match(/[?&]mode=(pfd|hsi|both)/) || [,"both"])[1];

// Fields the knob has taken local control of are not overwritten by the sim
// stream (the simulated unit is authoritative for what its knob sets).
const override = {};
function connect() {
  const es = new EventSource("/events");
  es.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      for (const k in target) if (k in d && !override[k]) target[k] = d[k];
      dispatchBridgeInputs(d);   // controller inputs forwarded by the bridge
      lastData = performance.now();
    } catch (_) {}
  };
}

// ---- canvas ----------------------------------------------------------------
const cvs = document.getElementById("g5");
const ctx = cvs.getContext("2d");
let W = 0, H = 0, DPR = 1, RW = 0, RH = 0;   // RW/RH = real canvas; W/H = current instrument
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 3);
  RW = W = window.innerWidth; RH = H = window.innerHeight;
  cvs.width = Math.round(RW * DPR); cvs.height = Math.round(RH * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener("resize", resize);
window.addEventListener("orientationchange", () => setTimeout(resize, 200));

const rad = (d) => d * Math.PI / 180;
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
function approach(c, t, dt, r) { return c + (t - c) * Math.min(1, dt * r); }
function approachAngle(c, t, dt, r) { let d = ((t - c + 540) % 360) - 180; return c + d * Math.min(1, dt * r); }
function rrect(x, y, w, h, r) {   // r ignored — square corners
  ctx.beginPath(); ctx.rect(x, y, w, h);
}

// Fixed-size value box (selected altitude, baro, ground speed). FIXED pixel
// height/font — does NOT scale with the display, per design. Auto-shrinks the
// font only if the text would overflow the given width.
// ---- live-tunable style (developer mode: press D, or open with ?dev) ------
const STYLE_DEFAULTS = {
  asiBoxH: 24, asiBoxFS: 17,   // airspeed readout pointer (width = speed-tape width)
  altBoxH: 25, altBoxFS: 17,   // altitude readout pointer (width = altimeter width)
  baroBoxH: 25, baroFS: 18, baroBoxW: 99,   // barometric setting box (width adjustable)
  gsBoxH: 24, gsFS: 16, gsLabFS: 11,   // ground speed box (PFD): value font + "GS" label font
  altSelBugH: 28,              // selected-altitude tape bug height
  altTapeFS: 17,               // altimeter tape numerals
  altTapeTickMaj: 9,           // altimeter 100-ft tick length
  altTapeTickMin: 5,           // altimeter 20-ft tick length
  asiTapeFS: 17,               // airspeed tape numerals
  asiTapeTickMaj: 7,           // airspeed 10-kt tick length
  asiTapeTickMin: 4,           // airspeed 5-kt tick length
  hdgFS: 15,           // PFD heading-box digits
  htBoxH: 22,          // PFD heading box height
  htBugWPct: 76,       // PFD heading bug width (% of box width)
  htBugH: 18,          // PFD heading bug height
  htTickMinor: 5,      // PFD heading 1° tick length
  htTickMajor: 6,      // PFD heading 5° tick length
  altSelFS: 18,        // selected-altitude number font
  altSelBoxH: 23,      // selected-altitude box height
  hsiMargin: 4,        // HSI display-edge margin
  hsiTopReserve: 27,   // HSI top space reserved for the heading box
  hsiBoxW: 87,         // HSI DIST / selected-heading box width
  hsiGsW: 78,          // HSI GS box width
  hsiHdgBoxH: 23,      // HSI selected-heading box height
  hsiHdgFS: 17,        // HSI selected-heading digits
  distLabFS: 10, distFS: 16,   // HSI DIST box: label + value fonts
  gsKtLabFS: 10, gsKtFS: 16,   // HSI GS box: label + value fonts
  cdiW: 146, cdiH: 16, cdiDotR: 4, cdiDiaR: 9,   // PFD lateral deviation (LOC/CDI)
  vdiW: 15, vdiH: 150, vdiDotR: 4, vdiDiaR: 8,   // glideslope/glidepath deviation (PFD + HSI)
  cmdSpan: 120, cmdDroop: 24, cmdThick: 9,       // flight-director command bars (single cue)
  acDeltaW: 62, acDeltaH: 16, acDeltaT: 29,      // aircraft symbol: center delta (half-width, height, inner notch half-width)
  acMarkLen: 41, acMarkH: 7, acMarkGap: 86, acMarkArrow: 7,  // level markers: length, total height, gap, inner arrowhead length
  slipR: 11, slipLineH: 25, slipGap: 15,         // slip/skid: ball radius, reference-line height, gap from center
  trnStdX: 36, trnBarTh: 9, trnTickH: 9, trnArrow: 9,   // turn rate: std-rate tick offset, trend-bar thickness, tick height, arrowhead length
};
const STYLE = Object.assign({}, STYLE_DEFAULTS);
try { Object.assign(STYLE, JSON.parse(localStorage.getItem("g5style") || "{}")); } catch (_) {}
let HDG_FS = STYLE.hdgFS;   // synced from STYLE each frame

// developer mode: freeze + component→row hover highlighting
let devFrozen = false, hitRegions = [], devPanelEl = null;
let noData = false;   // true when the sim stream is stale → show red-X failures
function valueBox(x, y, w, color, text, h, fs0) {
  ctx.fillStyle = "#000"; ctx.strokeStyle = color; ctx.lineWidth = 2;
  rrect(x, y, w, h, 4); ctx.fill(); ctx.stroke();
  let fs = fs0; ctx.font = `700 ${fs}px ${FONT}`;
  while (ctx.measureText(text).width > w - 8 && fs > 8) { fs--; ctx.font = `700 ${fs}px ${FONT}`; }
  ctx.fillStyle = color; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(text, x + w / 2, y + h / 2 + 1);
}

// Builds a "bug" marker path: a rectangle with a triangular notch CUT OUT of one
// edge (negative space — not a protrusion). Caller sets fillStyle then fill()s.
//   (cx,cy) = center, w/h = full size, face = edge the notch is cut into
//   ("up"/"down"/"left"/"right"), nd = notch depth, nh = notch half-width.
function bugPath(cx, cy, w, h, face, nd, nh) {
  const L = w / 2, T = h / 2;
  ctx.beginPath();
  if (face === "right") {
    ctx.moveTo(cx-L, cy-T); ctx.lineTo(cx+L, cy-T); ctx.lineTo(cx+L, cy-nh);
    ctx.lineTo(cx+L-nd, cy); ctx.lineTo(cx+L, cy+nh); ctx.lineTo(cx+L, cy+T); ctx.lineTo(cx-L, cy+T);
  } else if (face === "left") {
    ctx.moveTo(cx+L, cy-T); ctx.lineTo(cx-L, cy-T); ctx.lineTo(cx-L, cy-nh);
    ctx.lineTo(cx-L+nd, cy); ctx.lineTo(cx-L, cy+nh); ctx.lineTo(cx-L, cy+T); ctx.lineTo(cx+L, cy+T);
  } else if (face === "up") {
    ctx.moveTo(cx-L, cy-T); ctx.lineTo(cx-nh, cy-T); ctx.lineTo(cx, cy-T+nd);
    ctx.lineTo(cx+nh, cy-T); ctx.lineTo(cx+L, cy-T); ctx.lineTo(cx+L, cy+T); ctx.lineTo(cx-L, cy+T);
  } else { // down
    ctx.moveTo(cx-L, cy+T); ctx.lineTo(cx-nh, cy+T); ctx.lineTo(cx, cy+T-nd);
    ctx.lineTo(cx+nh, cy+T); ctx.lineTo(cx+L, cy+T); ctx.lineTo(cx+L, cy-T); ctx.lineTo(cx-L, cy-T);
  }
  ctx.closePath();
}

// Cyan "selected" box (selected altitude on the PFD, selected heading on the
// HSI): thin cyan border, a small bug icon on the left, value right-aligned.
// Identical look in both places — the heading one just passes a value with "°".
function selBox(x, y, w, h, value, numFS) {
  ctx.fillStyle = "#000"; ctx.strokeStyle = "#19d3ff"; ctx.lineWidth = 1;
  rrect(x, y, w, h, 3); ctx.fill(); ctx.stroke();
  const iconX = x + 8, iconW = 7;
  ctx.fillStyle = "#19d3ff"; ctx.strokeStyle = "#000"; ctx.lineWidth = 1;
  bugPath(iconX, y + h / 2, iconW, Math.round(h * 0.5), "right", 4, 3); ctx.fill(); ctx.stroke();
  ctx.fillStyle = "#19d3ff";
  let fs = numFS; const avail = (x + w - 6) - (iconX + iconW + 4);
  ctx.font = `700 ${fs}px ${FONT}`;
  while (ctx.measureText(value).width > avail && fs > 8) { fs--; ctx.font = `700 ${fs}px ${FONT}`; }
  ctx.textAlign = "right"; ctx.textBaseline = "middle";
  ctx.fillText(value, x + w - 6, y + h / 2 + 1);
}

// Dev mode: record a component's bounding box (in local draw coords) + the STYLE
// keys that size it, so hovering it can highlight the matching panel rows.
function hit(lx, ly, w, h, keys) {
  if (!devFrozen) return;
  const t = ctx.getTransform();
  hitRegions.push({ x: (t.a*lx + t.e)/DPR, y: (t.d*ly + t.f)/DPR, w: t.a*w/DPR, h: t.d*h/DPR, keys });
}
function devHighlight(keys) {
  if (!devPanelEl) return;
  devPanelEl.querySelectorAll("label[data-k]").forEach((l) => {
    l.style.background = keys && keys.includes(l.dataset.k) ? "#3c5a26" : "";
  });
}

// Boxed deviation scale (CDI / glideslope / glidepath): rounded translucent-grey
// box + grey border, a center reference line, larger HOLLOW dots at ±1/±2, and a
// filled diamond. vertical=false → horizontal (lateral); true → vertical.
function devScale(cx, cy, w, h, vertical, dev, dotR, diaR, diaColor) {
  const bx = cx - w/2, by = cy - h/2;
  // inner elements respect the box: dots/diamond clamped to the cross dimension,
  // dot spacing derived from the scale-axis length so the scale fills the box.
  const cross = vertical ? w : h, axis = vertical ? h : w;
  const r = Math.min(dotR, cross/2 - 1.5);
  const dr = Math.min(diaR, cross/2 - 1);
  const gap = (axis/2 - r - 3) / 2.5;
  ctx.fillStyle = "rgba(30,32,38,0.62)"; ctx.strokeStyle = "#9aa0a6"; ctx.lineWidth = 1;
  rrect(bx, by, w, h, 4); ctx.fill(); ctx.stroke();
  // hollow dots at ±1, ±2
  ctx.strokeStyle = "#fff"; ctx.lineWidth = 1.5;
  for (const d of [-2, -1, 1, 2]) {
    ctx.beginPath();
    if (vertical) ctx.arc(cx, cy + d * gap, r, 0, 7); else ctx.arc(cx + d * gap, cy, r, 0, 7);
    ctx.stroke();
  }
  const off = clamp(dev, -2.5, 2.5) * gap;
  if (vertical) {
    // glideslope: horizontal center reference (spans box width) + diamond moving vertically
    ctx.strokeStyle = "rgba(255,255,255,0.55)"; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(bx, cy); ctx.lineTo(bx + w, cy); ctx.stroke();
    const dyc = cy - off;
    ctx.fillStyle = diaColor; ctx.strokeStyle = "#000"; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx, dyc - dr); ctx.lineTo(cx + dr, dyc); ctx.lineTo(cx, dyc + dr); ctx.lineTo(cx - dr, dyc);
    ctx.closePath(); ctx.fill(); ctx.stroke();
  } else {
    // localizer: fixed VERTICAL center reference line (spans box height) + diamond moving left/right
    ctx.strokeStyle = "rgba(255,255,255,0.55)"; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(cx, by); ctx.lineTo(cx, by + h); ctx.stroke();
    const xx = cx + off;
    ctx.fillStyle = diaColor; ctx.strokeStyle = "#000"; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(xx, cy - dr); ctx.lineTo(xx + dr, cy); ctx.lineTo(xx, cy + dr); ctx.lineTo(xx - dr, cy);
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }
}

// ---- layout ----------------------------------------------------------------
function L() {
  const headH = Math.round(clamp(H * 0.055, 34, 52));
  const botH  = Math.round(clamp(H * 0.012, 5, 12));   // thin footer; GS/baro now boxed on the tapes
  const aTop = headH, aBot = H - botH;
  const aH = aBot - aTop;
  return {
    headH, botH, aTop, aBot, aH,
    cx: W / 2,
    cy: aTop + aH / 2,                  // = midY: aircraft symbol, readouts, VSI, glideslope all share the center line
    ppd: aH / 42,                       // pitch px/deg (~±21° visible)
    spdW: clamp(W * 0.15, 50, 78),
    altW: clamp(W * 0.18, 62, 92),
    vsiW: 18,
    pxKt: (aH / 2) / 45,                // ±45 kt
    pxFt: (aH / 2) / 320,               // ±320 ft
    midY: aTop + aH / 2,
  };
}

// ---- attitude --------------------------------------------------------------
function attitude(g) {
  const { cx, cy, aTop, aH, ppd } = g;
  ctx.save();
  ctx.beginPath(); ctx.rect(0, aTop, W, aH); ctx.clip();
  ctx.save();
  ctx.translate(cx, cy); ctx.rotate(rad(-disp.roll)); ctx.translate(0, disp.pitch * ppd);

  const big = (W + aH) * 2;
  let sky = ctx.createLinearGradient(0, -big, 0, 0);
  sky.addColorStop(0, "#0c4f8f"); sky.addColorStop(1, "#2a90df");
  ctx.fillStyle = sky; ctx.fillRect(-big, -big, big * 2, big);
  let gnd = ctx.createLinearGradient(0, 0, 0, big);
  gnd.addColorStop(0, "#8a5a2c"); gnd.addColorStop(1, "#4d3318");
  ctx.fillStyle = gnd; ctx.fillRect(-big, 0, big * 2, big);
  ctx.strokeStyle = "#fff"; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(-big, 0); ctx.lineTo(big, 0); ctx.stroke();

  // pitch ladder
  ctx.strokeStyle = "#fff"; ctx.fillStyle = "#fff"; ctx.lineWidth = 2;
  ctx.font = `600 ${Math.round(aH*0.022)}px ${FONT}`;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  for (let p = -90; p <= 90; p += 2.5) {
    if (p === 0) continue;
    const y = -p * ppd;
    if (Math.abs(y) > aH * 0.55) continue;
    let hw;
    if (p % 10 === 0) hw = aH * 0.085;
    else if (p % 5 === 0) hw = aH * 0.05;
    else hw = aH * 0.025;
    ctx.beginPath(); ctx.moveTo(-hw, y); ctx.lineTo(hw, y); ctx.stroke();
    if (p % 10 === 0) {
      const a = Math.abs(p);
      ctx.fillText(a, -hw - 14, y); ctx.fillText(a, hw + 14, y);
    }
  }
  ctx.restore();
  ctx.restore();

  rollScale(g);
  slipBall(g);
  // commandBars(g);   // FD (magenta, moving) — deferred
  aircraft(g);
}

function rollScale(g) {
  const { cx, cy, aH } = g;
  const R = aH * 0.40;
  ctx.save(); ctx.translate(cx, cy);
  // arc is the inner rim; ticks extend OUTWARD from it
  ctx.strokeStyle = "#fff"; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(0, 0, R, rad(-90 - 60), rad(-90 + 60)); ctx.stroke();
  for (const t of [-60,-45,-30,-20,-10,0,10,20,30,45,60]) {
    const th = rad(-90 + t);
    const major = (t % 30 === 0 || t === 0);
    const len = major ? 13 : 8;
    ctx.lineWidth = major ? 2.5 : 1.8;
    ctx.beginPath();
    ctx.moveTo(R*Math.cos(th), R*Math.sin(th));
    ctx.lineTo((R+len)*Math.cos(th), (R+len)*Math.sin(th));
    ctx.stroke();
  }
  // fixed reference triangle at top (apex down)
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.moveTo(0,-R+2); ctx.lineTo(-8,-R-12); ctx.lineTo(8,-R-12); ctx.closePath(); ctx.fill();
  // moving roll pointer (apex up to the scale) — white per spec (fig 2-4)
  ctx.rotate(rad(disp.roll));
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.moveTo(0,-R+3); ctx.lineTo(-9,-R+17); ctx.lineTo(9,-R+17); ctx.closePath(); ctx.fill();
  ctx.restore();
}

// Garmin fixed aircraft symbol (fig 2-4): a filled yellow center delta (caret)
// flanked by side level markers that taper to a point (arrow) toward center.
// Black-outlined; all dimensions are dev-tunable. Fixed — never moves.
function aircraft(g) {
  const { cx, cy } = g;
  ctx.save(); ctx.translate(cx, cy);
  ctx.lineJoin = "miter"; ctx.fillStyle = "#ffd21a"; ctx.strokeStyle = "#000"; ctx.lineWidth = 1.5;
  // center symbol — two elongated triangles meeting at a point on the level
  // line (y=0); the bodies fan down below. acDeltaT = inner notch half-width.
  const w = STYLE.acDeltaW, h = STYLE.acDeltaH, gp = STYLE.acDeltaT;
  for (const sgn of [-1, 1]) {
    ctx.beginPath();
    ctx.moveTo(0, 0);           // shared point on the level line
    ctx.lineTo(sgn * w, h);     // outer-bottom (wing tip)
    ctx.lineTo(sgn * gp, h);    // inner-bottom (notch)
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }
  // side level markers — a rectangular bar with a small triangle at the inner
  // end pointing toward center
  const len = STYLE.acMarkLen, hgt = STYLE.acMarkH, gap = STYLE.acMarkGap, ah = STYLE.acMarkArrow;
  for (const sgn of [-1, 1]) {
    const xin = sgn * gap, xb = sgn * (gap + ah), xout = sgn * (gap + len);
    ctx.beginPath();
    ctx.moveTo(xin, 0);            // inner tip (point toward center)
    ctx.lineTo(xb, -hgt / 2);      // triangle base, top (full height)
    ctx.lineTo(xout, -hgt / 2);    // outer top
    ctx.lineTo(xout, hgt / 2);     // outer bottom
    ctx.lineTo(xb, hgt / 2);       // triangle base, bottom
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }
  ctx.restore();
  const reach = STYLE.acMarkGap + STYLE.acMarkLen;
  hit(cx - reach, cy - STYLE.acDeltaH - 2, 2 * reach, STYLE.acDeltaH + STYLE.acMarkH + 4,
      ["acDeltaW", "acDeltaH", "acDeltaT", "acMarkLen", "acMarkH", "acMarkGap", "acMarkArrow"]);
}

// Single-cue flight-director command bars (fig 3-6). A wide magenta chevron with
// a yellow lower accent that the pilot flies the aircraft symbol into. Hollow
// (outline) when hand-flying with FD only; solid when the autopilot is engaged.
function commandBars(g) {
  if (target.apmode < 0.5) return;                 // FD off
  const { cx, cy, ppd } = g;
  const solid = target.apmode >= 1.5;              // AP engaged
  const span = STYLE.cmdSpan, droop = STYLE.cmdDroop, thick = STYLE.cmdThick;
  const pErr = clamp(disp.fdpitch - disp.pitch, -12, 12);
  const rErr = clamp(disp.fdroll - disp.roll, -30, 30);
  const cyc = cy - pErr * ppd;
  ctx.save();
  ctx.translate(cx, cyc); ctx.rotate(rad(rErr));
  ctx.lineJoin = "round";
  for (const s of [-1, 1]) {
    // wing body (apex at center top → wing tip, with thickness)
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(s*span/2, droop); ctx.lineTo(s*span/2, droop + thick); ctx.lineTo(0, thick);
    ctx.closePath();
    if (solid) { ctx.fillStyle = "#a657cf"; ctx.fill(); ctx.strokeStyle = "#000"; ctx.lineWidth = 1; ctx.stroke(); }
    else { ctx.fillStyle = "rgba(0,0,0,0.30)"; ctx.fill(); ctx.strokeStyle = "#a657cf"; ctx.lineWidth = 2; ctx.stroke(); }
    // yellow lower accent stripe
    ctx.beginPath();
    ctx.moveTo(0, thick*0.5); ctx.lineTo(s*span/2, droop + thick*0.5);
    ctx.lineTo(s*span/2, droop + thick); ctx.lineTo(0, thick);
    ctx.closePath(); ctx.fillStyle = "#ffd21a"; ctx.fill();
  }
  ctx.restore();
  hit(cx - span/2, cyc - 2, span, droop + thick + 4, ["cmdSpan", "cmdDroop", "cmdThick"]);
}

// Turn rate indicator — bottom of the PFD. White ticks at standard rate (3°/s);
// magenta trend bar shows current rate (spec §2.4, fig 2-11).
function turnRate(g) {
  const { cx, aBot } = g, y = aBot - 4;
  const stdX = STYLE.trnStdX, pps = stdX / 3, tickH = STYLE.trnTickH, barTh = STYLE.trnBarTh;
  // thin, soft dark line across the top of the indicator
  ctx.strokeStyle = "rgba(0,0,0,0.45)"; ctx.lineWidth = 1; ctx.lineCap = "butt";
  ctx.beginPath(); ctx.moveTo(cx - stdX * 1.7, y - tickH); ctx.lineTo(cx + stdX * 1.7, y - tickH); ctx.stroke();
  // white std-rate ticks
  ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx - stdX, y - tickH); ctx.lineTo(cx - stdX, y);
  ctx.moveTo(cx + stdX, y - tickH); ctx.lineTo(cx + stdX, y);
  ctx.stroke();
  // magenta trend — a level-marker-style arrow (rectangle + triangle point) in
  // the direction of turn, with a thin dark border
  const tx = cx + clamp(disp.turn, -4.5, 4.5) * pps, by = y - 4;
  const dir = (tx >= cx) ? 1 : -1, len = Math.abs(tx - cx);
  const ah = Math.min(STYLE.trnArrow, len + 0.5), xb = cx + dir * Math.max(0, len - ah);
  ctx.beginPath();
  ctx.moveTo(cx, by - barTh/2); ctx.lineTo(xb, by - barTh/2); ctx.lineTo(tx, by);
  ctx.lineTo(xb, by + barTh/2); ctx.lineTo(cx, by + barTh/2);
  ctx.closePath();
  ctx.fillStyle = "#d24fc8"; ctx.fill();
  ctx.strokeStyle = "rgba(0,0,0,0.65)"; ctx.lineWidth = 1; ctx.lineJoin = "round"; ctx.stroke();
  hit(cx - stdX * 1.7, y - tickH - 3, stdX * 3.4, tickH + 8, ["trnStdX", "trnBarTh", "trnTickH", "trnArrow"]);
}

// Course Deviation Indicator on the PFD — horizontal scale below the slip/skid
// (spec §2.3.1, fig 2-21). Magenta diamond = GPS source.
function pfdCDI(g) {
  const { cx, aBot, aH } = g, y = aBot - aH * 0.12 - 22;
  devScale(cx, y, STYLE.cdiW, STYLE.cdiH, false, disp.cdi, STYLE.cdiDotR, STYLE.cdiDiaR, "#d24fc8");
  hit(cx - STYLE.cdiW/2, y - STYLE.cdiH/2, STYLE.cdiW, STYLE.cdiH, ["cdiW", "cdiH", "cdiDotR", "cdiDiaR"]);
}

// Vertical deviation (glideslope/glidepath) diamond left of the altimeter
// (spec §4.2, figs 2-23/2-25). Green = ILS; shown only when guidance is valid.
function pfdVDI(g) {
  if (target.vshow < 0.5) return;
  const xv = (W - g.altW - g.vsiW) - 14, midY = g.midY;
  devScale(xv, midY, STYLE.vdiW, STYLE.vdiH, true, disp.vdef, STYLE.vdiDotR, STYLE.vdiDiaR, "#16c61a");
  hit(xv - STYLE.vdiW/2, midY - STYLE.vdiH/2, STYLE.vdiW, STYLE.vdiH, ["vdiW", "vdiH", "vdiDotR", "vdiDiaR"]);
}

// slip/skid: a white ball between two vertical reference lines (|O|), below the
// loc bar. The ball slides left/right with slip.
function slipBall(g) {
  const { cx, aBot, aH } = g;
  const y = aBot - aH * 0.045 - 18;
  const ballR = STYLE.slipR, lh = STYLE.slipLineH, gap = STYLE.slipGap;
  const off = clamp(disp.slip * 7, -(gap + ballR + 4), gap + ballR + 4);
  // vertical reference lines: white with a thin black border (black underlay)
  ctx.lineCap = "butt";
  const lines = () => { ctx.beginPath();
    ctx.moveTo(cx - gap, y - lh/2); ctx.lineTo(cx - gap, y + lh/2);
    ctx.moveTo(cx + gap, y - lh/2); ctx.lineTo(cx + gap, y + lh/2);
    ctx.stroke(); };
  ctx.strokeStyle = "#000"; ctx.lineWidth = 4.5; lines();
  ctx.strokeStyle = "#fff"; ctx.lineWidth = 2.5; lines();
  ctx.fillStyle = "#fff"; ctx.strokeStyle = "#000"; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(cx + off, y, ballR, 0, 7); ctx.fill(); ctx.stroke();
  hit(cx - gap - ballR - 4, y - lh/2 - 2, 2*(gap + ballR + 4), lh + 4, ["slipR", "slipLineH", "slipGap"]);
}

// ---- tapes -----------------------------------------------------------------
function speedTape(g) {
  const x = 0, w = g.spdW, top = g.aTop, h = g.aH, midY = g.midY;
  ctx.fillStyle = "rgba(15,15,18,0.55)"; ctx.fillRect(x, top, w, h);
  hit(x, top, w, h, ["asiTapeFS", "asiTapeTickMaj", "asiTapeTickMin"]);
  ctx.save(); ctx.beginPath(); ctx.rect(x, top, w, h); ctx.clip();
  const v = disp.ias, span = (h/2)/g.pxKt;
  const sy = (s) => midY - (s - v) * g.pxKt;

  // --- color speed strip ("barber pole") on the inner edge -----------------
  const colW = 5, outX = x + w - colW, inX = outX - 4;  // outer (green/yellow/red) + inner white
  const lo = v - span - 12, hi = v + span + 12;
  const seg = (s0, s1, col, xx, ww) => {
    const a = clamp(s0, lo, hi), b = clamp(s1, lo, hi);
    if (b <= a) return; ctx.fillStyle = col; ctx.fillRect(xx, sy(b), ww, sy(a) - sy(b));
  };
  seg(lo, ASI.vs0, "#c41a1a", outX, colW);     // low-speed red awareness (below Vs0)
  seg(ASI.vs1, ASI.vno, "#16a016", outX, colW);// green normal range
  seg(ASI.vno, ASI.vne, "#d8c41a", outX, colW);// yellow caution
  seg(ASI.vne, hi, "#c41a1a", outX, colW);     // red (above Vne)
  seg(ASI.vs0, ASI.vfe, "#f2f2f2", inX, 4);    // white flap operating range
  { const y = sy(ASI.vne); ctx.fillStyle = "#c41a1a"; ctx.fillRect(inX - 1, y - 1.5, w - (inX - x), 3); } // Vne line

  // --- tick marks + labels --------------------------------------------------
  ctx.strokeStyle = "#fff"; ctx.fillStyle = "#fff"; ctx.lineWidth = 1.5;
  ctx.font = `600 ${STYLE.asiTapeFS}px ${FONT}`;
  ctx.textAlign = "right"; ctx.textBaseline = "middle";
  const tMaj = STYLE.asiTapeTickMaj, tMin = STYLE.asiTapeTickMin;
  for (let s = Math.ceil((v-span)/5)*5; s <= v+span; s += 5) {
    if (s < 0) continue;
    const y = sy(s);
    if (s % 10 === 0) { ctx.beginPath(); ctx.moveTo(inX,y); ctx.lineTo(inX-tMaj,y); ctx.stroke(); ctx.fillText(s, inX-tMaj-3, y); }
    else { ctx.beginPath(); ctx.moveTo(inX,y); ctx.lineTo(inX-tMin,y); ctx.stroke(); }
  }

  // --- airspeed trend vector (magenta, predicted 6 s) -----------------------
  if (Math.abs(asiTrend) > 1) {
    const yTo = sy(clamp(v + asiTrend, v - span, v + span)), yFrom = sy(v);
    ctx.strokeStyle = "#d24fc8"; ctx.lineWidth = 4; ctx.lineCap = "butt";
    ctx.beginPath(); ctx.moveTo(x + w - 2, yFrom); ctx.lineTo(x + w - 2, yTo); ctx.stroke();
  }

  // --- Vspeed reference tags (right of the tape) ----------------------------
  ctx.textAlign = "left"; ctx.font = `700 ${Math.round(g.aH*0.024)}px ${FONT}`;
  for (const vs of ASI.vspeeds) {
    const y = sy(vs.v); if (y < top + 2 || y > top + h - 2) continue;
    ctx.fillStyle = "#ffd21a"; ctx.fillText(vs.l, x + w - colW + 7, y);
  }
  ctx.restore();

  // readout: box turns RED at/above Vne; number turns YELLOW if the trend
  // vector reaches Vne (spec §2.1).
  const overVne = v >= ASI.vne, trendVne = (v + asiTrend) >= ASI.vne;
  readout(x, midY, w, Math.round(v).toString(), "right", STYLE.asiBoxH, STYLE.asiBoxFS,
          overVne ? "#c41a1a" : "#000", trendVne && !overVne ? "#ffd21a" : "#fff");
  hit(x, midY - STYLE.asiBoxH/2, w, STYLE.asiBoxH, ["asiBoxH", "asiBoxFS"]);
  // ground speed box (magenta), flush to the bottom — small "GS" label + value
  const gy = H - STYLE.gsBoxH, gh = STYLE.gsBoxH;
  ctx.fillStyle = "#000"; ctx.strokeStyle = "#e94fd0"; ctx.lineWidth = 2;
  rrect(x, gy, w, gh, 4); ctx.fill(); ctx.stroke();
  ctx.fillStyle = "#e94fd0"; ctx.textBaseline = "middle";
  ctx.textAlign = "left";  ctx.font = `700 ${STYLE.gsLabFS}px ${FONT}`; ctx.fillText("GS", x + 5, gy + gh/2 + 1);
  ctx.textAlign = "right"; ctx.font = `700 ${STYLE.gsFS}px ${FONT}`;    ctx.fillText(Math.round(disp.gs).toString(), x + w - 5, gy + gh/2 + 1);
  hit(x, gy, w, gh, ["gsBoxH", "gsFS", "gsLabFS"]);
}

function altTape(g) {
  const x = W - g.altW - g.vsiW, w = g.altW, top = g.aTop, h = g.aH, midY = g.midY;
  ctx.fillStyle = "rgba(15,15,18,0.55)"; ctx.fillRect(x, top, w, h);
  hit(x, top, w, h, ["altTapeFS", "altTapeTickMaj", "altTapeTickMin"]);
  ctx.save(); ctx.beginPath(); ctx.rect(x, top, w, h); ctx.clip();
  ctx.strokeStyle = "#fff"; ctx.fillStyle = "#fff"; ctx.lineWidth = 1.5;
  ctx.font = `600 ${STYLE.altTapeFS}px ${FONT}`;
  ctx.textAlign = "left"; ctx.textBaseline = "middle";
  const v = disp.alt, span = (h/2)/g.pxFt, tMaj = STYLE.altTapeTickMaj, tMin = STYLE.altTapeTickMin;
  for (let s = Math.ceil((v-span)/20)*20; s <= v+span; s += 20) {
    const y = midY - (s - v) * g.pxFt;
    if (s % 100 === 0) { ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+tMaj,y); ctx.stroke(); ctx.fillText(s, x+tMaj+4, y); }
    else { ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+tMin,y); ctx.stroke(); }
  }
  // selected-altitude bug (cyan), clipped to the tape; notch cut into the edge
  // facing the scale
  const yb = midY - (disp.altsel - v) * g.pxFt;
  ctx.fillStyle = "#19d3ff"; ctx.strokeStyle = "#000"; ctx.lineWidth = 1;
  bugPath(x + 7, yb, 14, STYLE.altSelBugH, "right", 10, 5); ctx.fill(); ctx.stroke();
  ctx.restore();
  readout(x, midY, w, Math.round(v).toString(), "left", STYLE.altBoxH, STYLE.altBoxFS);
  hit(x, midY - STYLE.altBoxH/2, w, STYLE.altBoxH, ["altBoxH", "altBoxFS"]);
  // selected altitude — extends to the right edge of the screen; the box hugs
  // the number (~1px), font size unchanged
  selBox(x, top, W - x, STYLE.altSelBoxH, Math.round(disp.altsel).toString(), STYLE.altSelFS);
  hit(x, top, W - x, STYLE.altSelBoxH, ["altSelFS", "altSelBoxH", "altSelBugH"]);
  valueBox(x, H - STYLE.baroBoxH, STYLE.baroBoxW, "#19d3ff", disp.baro.toFixed(2), STYLE.baroBoxH, STYLE.baroFS);
  hit(x, H - STYLE.baroBoxH, STYLE.baroBoxW, STYLE.baroBoxH, ["baroBoxH", "baroFS", "baroBoxW"]);
}

function vsiTape(g) {
  const x = W - g.vsiW, w = g.vsiW, top = g.aTop, h = g.aH, midY = g.midY;
  ctx.fillStyle = "rgba(15,15,18,0.6)"; ctx.fillRect(x, top, w, h);
  ctx.strokeStyle = "#777"; ctx.lineWidth = 1;
  for (let k = -2; k <= 2; k++) { const y = midY - k*(h*0.19); ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+4,y); ctx.stroke(); }
  const v = clamp(disp.vsi, -2000, 2000), y = midY - (v/2000)*(h*0.38);
  ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(x,midY); ctx.lineTo(x,y); ctx.stroke();
  ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+8,y-4); ctx.lineTo(x+8,y+4); ctx.closePath(); ctx.fill();
}

// Current-value pointer (airspeed / altitude). FIXED height/font — does not
// scale with the display.
function readout(x, midY, w, text, side, h, fs, bg = "#000", fg = "#fff") {
  const y = midY - h/2, arrow = 9;
  ctx.fillStyle = bg; ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
  ctx.beginPath();
  if (side === "right") {
    ctx.moveTo(x, y); ctx.lineTo(x+w-arrow, y); ctx.lineTo(x+w, midY); ctx.lineTo(x+w-arrow, y+h); ctx.lineTo(x, y+h);
  } else {
    ctx.moveTo(x+w, y); ctx.lineTo(x+arrow, y); ctx.lineTo(x, midY); ctx.lineTo(x+arrow, y+h); ctx.lineTo(x+w, y+h);
  }
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.fillStyle = fg; ctx.font = `700 ${fs}px ${FONT}`;
  ctx.textBaseline = "middle"; ctx.textAlign = side === "right" ? "right" : "left";
  ctx.fillText(text, side === "right" ? x+w-arrow-6 : x+arrow+6, midY+1);
}

// ---- heading tape (top) ----------------------------------------------------
function headingTape(g) {
  const h = g.headH, cx = W/2, ppd = W/64;
  // background: a blue slightly darker than the attitude sky
  ctx.fillStyle = "#0a3f6e"; ctx.fillRect(0, 0, W, h);
  ctx.strokeStyle = "#06243f"; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(0,h); ctx.lineTo(W,h); ctx.stroke();

  const bh = STYLE.htBoxH;                         // short heading box, pinned to the top
  ctx.font = `700 ${HDG_FS}px ${FONT}`;
  const bw = Math.ceil(ctx.measureText("000").width) + 12;   // just wide enough for 3 digits
  const labelY = bh / 2;
  const hdg = disp.hdg, span = (W/2)/ppd;

  ctx.save(); ctx.beginPath(); ctx.rect(0,0,W,h); ctx.clip();

  // tape labels (aligned with the box, every 10°) + tick marks CLAMPED to the
  // bottom edge: minor every 1°, 5° marks slightly taller (spec §2.5)
  ctx.strokeStyle = "#fff"; ctx.fillStyle = "#fff";
  ctx.font = `600 ${Math.round(bh*0.6)}px ${FONT}`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  for (let d = Math.ceil(hdg-span); d <= hdg+span; d++) {
    const dd = ((d%360)+360)%360, x = cx + (d-hdg)*ppd, major = (d % 5 === 0);
    ctx.lineWidth = major ? 1.5 : 1;
    ctx.beginPath(); ctx.moveTo(x, h); ctx.lineTo(x, h - (major ? STYLE.htTickMajor : STYLE.htTickMinor)); ctx.stroke();
    if (d % 10 === 0 && Math.abs(x - cx) > bw/2 + 15) {
      const lbl = (dd===0 ? 360 : dd).toString().padStart(3, "0");
      ctx.fillText(lbl, x, labelY);
    }
  }

  // heading bug (cyan) — same width as the box, slightly shorter; its top-edge
  // notch mirrors the box's tab so the two interlock ("two parts of a whole")
  const dh = ((disp.hdgbug - hdg + 540) % 360) - 180, xb = cx + dh * ppd;
  const hbh = STYLE.htBugH;
  ctx.fillStyle = "#19d3ff"; ctx.strokeStyle = "#000"; ctx.lineWidth = 1;
  bugPath(xb, bh + hbh / 2, bw * STYLE.htBugWPct / 100, hbh, "up", 7, 6); ctx.fill(); ctx.stroke();

  // current ground-track triangle (magenta) at the bottom of the band, pointing up
  const dt = ((disp.trk - hdg + 540) % 360) - 180, xt = cx + dt * ppd;
  ctx.fillStyle = "#d24fc8";
  ctx.beginPath(); ctx.moveTo(xt, h-10); ctx.lineTo(xt-7, h-1); ctx.lineTo(xt+7, h-1); ctx.closePath(); ctx.fill();
  ctx.restore();

  // boxed current heading — pinned to top, with a triangle tab STICKING OUT of
  // the bottom (the lubber, pointing down at the scale); its triangle mirrors the
  // bug's cut-out notch. Negative depth = protrusion. Thin border, no degree.
  bugPath(cx, bh/2, bw, bh, "down", -7, 6);
  ctx.fillStyle = "#000"; ctx.fill();
  ctx.strokeStyle = "#fff"; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = "#fff"; ctx.font = `700 ${HDG_FS}px ${FONT}`;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  let hh = Math.round(((hdg%360)+360)%360); if (hh===0) hh=360;
  ctx.fillText(hh.toString().padStart(3,"0"), cx, bh/2 + 1);
  hit(0, 0, W, h, ["htBoxH", "hdgFS", "htTickMinor", "htTickMajor", "htBugWPct", "htBugH"]);
}

// ---- no-data failure annunciations (red-X), per the real instruments -------
const FAIL_MAROON = "#1c0707", FAIL_RED = "#d11a1a", FAIL_YEL = "#ffd21a";
function failRedX(x, y, w, h) {
  ctx.strokeStyle = FAIL_RED;
  ctx.lineWidth = Math.max(7, Math.min(w, h) * 0.13);
  ctx.lineCap = "round"; ctx.lineJoin = "round";
  const m = ctx.lineWidth * 0.6;   // inset so the rounded caps are clearly visible
  ctx.beginPath();
  ctx.moveTo(x + m, y + m); ctx.lineTo(x + w - m, y + h - m);
  ctx.moveTo(x + w - m, y + m); ctx.lineTo(x + m, y + h - m);
  ctx.stroke();
}
function failStack(str, cx, midY, fs) {   // vertical stacked yellow letters
  ctx.fillStyle = FAIL_YEL; ctx.font = `700 ${fs}px ${FONT}`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  const lh = fs * 0.92, y0 = midY - (str.length - 1) * lh / 2;
  for (let i = 0; i < str.length; i++) ctx.fillText(str[i], cx, y0 + i * lh);
}
// PFD no-data: red-X over each instrument (fig 1-2). Baro + GS boxes stay.
function drawPFDFail(g) {
  const top = g.aTop, h = g.aH, headH = g.headH;
  const sw = g.spdW, ax0 = g.spdW, ax1 = W - g.altW - g.vsiW, aw = ax1 - ax0;
  const altX = ax1, altW2 = g.altW + g.vsiW;
  const panel = (x, y, w, hh) => { ctx.fillStyle = FAIL_MAROON; ctx.fillRect(x, y, w, hh); };
  // heading band
  panel(0, 0, W, headH); failRedX(0, 0, W, headH);
  ctx.fillStyle = FAIL_YEL; ctx.font = `700 ${Math.round(headH * 0.5)}px ${FONT}`;
  ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText("HEADING FAIL", W / 2, headH / 2);
  // airspeed (left): AIRSPEED | FAIL
  panel(0, top, sw, h); failRedX(0, top, sw, h);
  const vfs = Math.min(16, Math.round(sw * 0.26));
  failStack("AIRSPEED", sw * 0.32, top + h / 2, vfs);
  failStack("FAIL", sw * 0.74, top + h / 2, vfs);
  // attitude (center): red-X + ATTITUDE FAIL + aircraft symbol
  panel(ax0, top, aw, h); failRedX(ax0, top, aw, h);
  ctx.fillStyle = FAIL_YEL; ctx.font = `700 ${Math.round(aw * 0.12)}px ${FONT}`;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText("ATTITUDE", W / 2, top + h * 0.3);
  ctx.fillText("FAIL", W / 2, top + h * 0.3 + aw * 0.13);
  aircraft({ cx: W / 2, cy: top + h * 0.58, aH: h });
  // altimeter (right): ALTITUDE | FAIL
  panel(altX, top, altW2, h); failRedX(altX, top, altW2, h);
  failStack("ALTITUDE", altX + altW2 * 0.3, top + h / 2, vfs);
  failStack("FAIL", altX + altW2 * 0.72, top + h / 2, vfs);
  // baro (valid pilot setting) + GS boxes remain
  valueBox(altX, H - STYLE.baroBoxH, STYLE.baroBoxW, "#19d3ff", disp.baro.toFixed(2), STYLE.baroBoxH, STYLE.baroFS);
  valueBox(0, H - STYLE.gsBoxH, sw, "#9aa0a6", "GS", STYLE.gsBoxH, STYLE.gsFS);
  failRedX(0, H - STYLE.gsBoxH, sw, STYLE.gsBoxH);
}
// HSI no-data: red-X over the rose + amber HDG flag (figs 1-3 / 1-9).
function drawHSIFail(cx, cy, R) {
  failRedX(cx - R, cy - R, R * 2, R * 2);
  ctx.fillStyle = "#ffb000"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.font = `700 ${Math.round(R * 0.16)}px ${FONT}`;
  // amber HDG flag at the top lubber
  ctx.fillStyle = "#000"; ctx.fillRect(cx - R * 0.18, cy - R - R * 0.02, R * 0.36, R * 0.22);
  ctx.fillStyle = "#ffb000"; ctx.fillText("HDG", cx, cy - R + R * 0.08);
  ctx.font = `700 ${Math.round(R * 0.2)}px ${FONT}`;
  ctx.fillText("HEADING", cx, cy - R * 0.14);
  ctx.fillText("FAIL", cx, cy + R * 0.14);
}

// ---- HSI mode --------------------------------------------------------------
const ROSE_LABELS = {0:"N",30:"3",60:"6",90:"E",120:"12",150:"15",180:"S",210:"21",240:"24",270:"W",300:"30",330:"33"};
const MAG = "#d24fc8", CYAN = "#19d3ff", GRN = "#16c61a";
// HSI nav annunciations. navsrc/cdiscale are always shown; msg/obs/gpss are
// capability stubs (off until wired to nav data via server/bridge).
const HSI = { navsrc: "GPS", navcolor: MAG, cdiscale: "ENR", msg: "MSG", obs: true, gpss: false };

function drawHSI(unit) {
  ctx.fillStyle = "#000"; ctx.fillRect(0, 0, W, H);
  // fill the display: only a few px of margin, with room at the top for the box
  const M = STYLE.hsiMargin, boxH = STYLE.hsiTopReserve, cx = W / 2;
  const top = M + boxH, bot = H - M;
  const R = Math.min((W - 2 * M) / 2, (bot - top) / 2);
  const cy = (top + bot) / 2;
  if (noData) { drawHSIFail(cx, cy, R); return; }

  // rotating compass card
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(rad(-disp.hdg));
  ctx.strokeStyle = "#fff"; ctx.fillStyle = "#fff";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  for (let a = 0; a < 360; a += 5) {
    const major = a % 30 === 0, med = a % 10 === 0;
    const len = major ? 16 : med ? 11 : 7;
    ctx.lineWidth = major ? 2.5 : 1.4;
    const th = rad(a - 90);
    ctx.beginPath();
    ctx.moveTo((R-len)*Math.cos(th), (R-len)*Math.sin(th));
    ctx.lineTo(R*Math.cos(th), R*Math.sin(th));
    ctx.stroke();
    if (a in ROSE_LABELS) {
      const cardinal = (a % 90 === 0);
      ctx.font = `${cardinal?700:600} ${Math.round(R*(cardinal?0.17:0.13))}px ${FONT}`;
      const rr = R - len - R*0.12;
      ctx.save(); ctx.translate(rr*Math.cos(th), rr*Math.sin(th)); ctx.rotate(rad(a)); ctx.fillText(ROSE_LABELS[a], 0, 0); ctx.restore();
    }
  }
  ctx.restore();

  // heading bug (cyan) on the rim — same width as the HSI heading box, slightly
  // shorter; outer-edge notch mirrors the box's tab ("two parts of a whole")
  rosePointer(cx, cy, R, disp.hdgbug - disp.hdg, () => {
    ctx.font = `700 ${HDG_FS + 2}px ${FONT}`;
    const hbw = (Math.ceil(ctx.measureText("000°").width) + 12) * 0.75, hbh = 13;
    ctx.fillStyle = CYAN; ctx.strokeStyle = "#000"; ctx.lineWidth = 1;
    bugPath(0, -R + hbh / 2, hbw, hbh, "up", 7, 6); ctx.fill(); ctx.stroke();
  });
  // current ground track — magenta triangle at the rim + dashed radial line
  // (spec §2.2.1 / fig 2-15)
  rosePointer(cx, cy, R, disp.trk - disp.hdg, () => {
    ctx.setLineDash([5, 4]); ctx.strokeStyle = MAG; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(0, -R + 14); ctx.lineTo(0, 0); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = MAG; ctx.beginPath();
    ctx.moveTo(0, -R + 14); ctx.lineTo(-8, -R - 2); ctx.lineTo(8, -R - 2);
    ctx.closePath(); ctx.fill();
  });

  courseNeedle(cx, cy, R);
  hsiBearingPointer(cx, cy, R, unit);
  hsiAircraft(cx, cy, R);
  hsiAnnun(cx, cy, R);
  hsiVDI(cx, cy, R);
  hsiLubber(cx, cy, R);
  hsiReadouts(cx, cy, R);
}

function rosePointer(cx, cy, R, angDeg, draw) {
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(rad(angDeg)); draw(); ctx.restore();
}

function courseNeedle(cx, cy, R) {
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(rad(disp.crs - disp.hdg));
  ctx.strokeStyle = MAG; ctx.fillStyle = MAG; ctx.lineWidth = 4; ctx.lineCap = "round";
  const head = R*0.78, tail = R*0.78, gap = R*0.50;
  // course arrow (top)
  ctx.beginPath(); ctx.moveTo(0,-gap); ctx.lineTo(0,-head); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-head-2); ctx.lineTo(-10,-head+16); ctx.lineTo(10,-head+16); ctx.closePath(); ctx.fill();
  // tail
  ctx.beginPath(); ctx.moveTo(0,gap); ctx.lineTo(0,tail); ctx.stroke();
  // CDI deviation bar (center), offset by dots
  const dev = clamp(disp.cdi, -2.5, 2.5) * (R*0.16);
  ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(dev,-gap*0.86); ctx.lineTo(dev,gap*0.86); ctx.stroke();
  // deviation dots
  ctx.fillStyle = "#fff";
  for (const d of [-2,-1,1,2]) { ctx.beginPath(); ctx.arc(d*(R*0.16),0,2.6,0,7); ctx.fill(); }
  // TO/FROM triangle
  if (disp.tofrom > 0.5) {
    ctx.fillStyle = MAG; const up = disp.tofrom < 1.5; const yy = R*0.30;
    ctx.beginPath();
    if (up) { ctx.moveTo(0,-yy-14); ctx.lineTo(-11,-yy); ctx.lineTo(11,-yy); }
    else { ctx.moveTo(0,yy+14); ctx.lineTo(-11,yy); ctx.lineTo(11,yy); }
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function hsiAircraft(cx, cy, R) {
  ctx.save(); ctx.translate(cx, cy);
  const s = R*0.16;
  ctx.strokeStyle = "#fff"; ctx.fillStyle = "#fff"; ctx.lineWidth = 4; ctx.lineCap = "round"; ctx.lineJoin = "round";
  ctx.beginPath();
  ctx.moveTo(0,-s*1.2); ctx.lineTo(0,s*1.3);             // fuselage
  ctx.moveTo(-s*1.4,0); ctx.lineTo(s*1.4,0);             // main wing
  ctx.moveTo(-s*0.6,s); ctx.lineTo(s*0.6,s);             // tail
  ctx.stroke();
  ctx.restore();
}

// Lubber line + boxed current heading at the top of the HSI (fig 2-15, #15/#16).
function hsiLubber(cx, cy, R) {
  // lubber index triangle at the rim
  ctx.fillStyle = "#fff"; ctx.beginPath();
  ctx.moveTo(cx, cy - R + 2); ctx.lineTo(cx - 7, cy - R - 11); ctx.lineTo(cx + 7, cy - R - 11); ctx.closePath(); ctx.fill();
  let hh = Math.round(((disp.hdg % 360) + 360) % 360); if (hh === 0) hh = 360;
  // boxed current heading — only slightly bigger than the PFD heading box, WITH
  // a degree symbol; notch cut into the bottom edge to match the bug; thin border
  const fs = HDG_FS + 2, bh = fs + 8;
  ctx.font = `700 ${fs}px ${FONT}`;
  const bw = Math.ceil(ctx.measureText("000°").width) + 12;
  const bcy = Math.max(2 + bh / 2, cy - R - 13 - bh / 2);
  bugPath(cx, bcy, bw, bh, "down", -7, 6);
  ctx.fillStyle = "#000"; ctx.fill();
  ctx.strokeStyle = "#fff"; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(hh.toString().padStart(3, "0") + "°", cx, bcy + 1);
}

// Bearing pointer (light blue) — points to disp.brg; source per the unit's
// Bearing menu setting (fig 2-16/2-17). Separated from the CDI by a white ring.
function hsiBearingPointer(cx, cy, R, unit) {
  if (BEARING[unit.bearingSrc] === "None") return;
  ctx.strokeStyle = "rgba(255,255,255,0.35)"; ctx.lineWidth = 1;  // separation ring
  ctx.beginPath(); ctx.arc(cx, cy, R * 0.55, 0, 7); ctx.stroke();
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(rad(disp.brg - disp.hdg));
  ctx.strokeStyle = CYAN; ctx.fillStyle = CYAN; ctx.lineWidth = 3; ctx.lineCap = "round";
  const ro = R * 0.93, ri = R * 0.58;
  ctx.beginPath(); ctx.moveTo(0, -ri); ctx.lineTo(0, -ro); ctx.stroke();          // head shaft
  ctx.beginPath(); ctx.moveTo(0, -ro - 2); ctx.lineTo(-7, -ro + 13); ctx.lineTo(7, -ro + 13); ctx.closePath(); ctx.fill(); // arrow
  ctx.beginPath(); ctx.moveTo(0, ri); ctx.lineTo(0, ro); ctx.stroke();            // tail
  ctx.restore();
}

// Center annunciations: nav source, GPS CDI scale, message, OBS (fig 2-15).
function hsiAnnun(cx, cy, R) {
  ctx.textBaseline = "middle";
  const fs = Math.round(R * 0.13);
  ctx.font = `700 ${fs}px ${FONT}`;
  ctx.textAlign = "right"; ctx.fillStyle = HSI.navcolor; ctx.fillText(HSI.navsrc, cx - R * 0.22, cy - R * 0.17);
  ctx.textAlign = "left";  ctx.fillStyle = GRN;          ctx.fillText(HSI.cdiscale, cx + R * 0.22, cy - R * 0.17);
  if (HSI.msg) { ctx.textAlign = "right"; ctx.fillStyle = "#ffb000"; ctx.fillText(HSI.msg, cx - R * 0.22, cy + R * 0.17); }
  if (HSI.obs) { ctx.textAlign = "left";  ctx.fillStyle = "#fff";    ctx.fillText("OBS", cx + R * 0.22, cy + R * 0.17); }
  if (HSI.gpss) { ctx.textAlign = "left"; ctx.fillStyle = GRN; ctx.font = `700 ${Math.round(R * 0.12)}px ${FONT}`;
                  ctx.fillText("GPSS", W * 0.03, cy - R * 0.92); }
}

// Vertical deviation diamond to the right of the rose (figs 2-24/2-26).
function hsiVDI(cx, cy, R) {
  if (target.vshow < 0.5) return;
  const xv = Math.min(cx + R + 4 + STYLE.vdiW/2, W - 6 - STYLE.vdiW/2);
  devScale(xv, cy, STYLE.vdiW, STYLE.vdiH, true, disp.vdef, STYLE.vdiDotR, STYLE.vdiDiaR, "#16c61a");
  hit(xv - STYLE.vdiW/2, cy - STYLE.vdiH/2, STYLE.vdiW, STYLE.vdiH, ["vdiW", "vdiH", "vdiDotR", "vdiDiaR"]);
}

function hsiReadouts(cx, cy, R) {
  const BW = STYLE.hsiBoxW;               // shared box width (DIST, heading)
  // grey-bordered box with the label INSIDE (white, top) over a magenta number;
  // label + value fonts are independent per box.
  const dataBox = (label, value, anchorX, anchorY, corner, w, keys, labFS, valFS) => {
    const h = labFS + valFS + 9;
    const x = corner.includes("right") ? anchorX - w : anchorX;
    const y = corner.includes("bottom") ? anchorY - h : anchorY;
    ctx.fillStyle = "#000"; ctx.strokeStyle = "#9aa0a6"; ctx.lineWidth = 1;
    rrect(x, y, w, h, 3); ctx.fill(); ctx.stroke();
    hit(x, y, w, h, keys);
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillStyle = "#e8eaed"; ctx.font = `600 ${labFS}px ${FONT}`;
    ctx.fillText(label, x + w/2, y + labFS*0.5 + 4);
    ctx.fillStyle = MAG; ctx.font = `700 ${valFS}px ${FONT}`;
    ctx.fillText(value, x + w/2, y + h - valFS*0.5 - 4);
  };
  dataBox("DIST NM", Math.round(disp.dist).toString(), W, 0, "topright", BW,
          ["hsiBoxW", "distFS", "distLabFS"], STYLE.distLabFS, STYLE.distFS);
  dataBox("GS KT", Math.round(disp.gs).toString(), 0, H, "bottomleft", STYLE.hsiGsW,
          ["hsiGsW", "gsKtFS", "gsKtLabFS"], STYLE.gsKtLabFS, STYLE.gsKtFS);

  // selected heading (bottom-right) — wide, short cyan box; thin bug icon + 060°,
  // only a few px between the number and the border
  let hb = Math.round(((disp.hdgbug%360)+360)%360); if (hb===0) hb=360;
  const shTxt = hb.toString().padStart(3,"0") + "°";
  const bh = STYLE.hsiHdgBoxH, bw = BW, bx = W - bw, by = H - bh;
  selBox(bx, by, bw, bh, shTxt, STYLE.hsiHdgFS);
  hit(bx, by, bw, bh, ["hsiBoxW", "hsiHdgBoxH", "hsiHdgFS"]);
}

// ---- PFD wrapper + compositor ----------------------------------------------
function drawPFD() {
  const g = L();
  ctx.fillStyle = "#000"; ctx.fillRect(0,0,W,H);
  if (noData) { drawPFDFail(g); return; }
  attitude(g);
  pfdCDI(g); turnRate(g);
  speedTape(g); vsiTape(g); altTape(g); pfdVDI(g);
  headingTape(g);
}

function renderInto(unit, x, y, w, h) {
  ctx.save(); ctx.translate(x, y);
  ctx.beginPath(); ctx.rect(0, 0, w, h); ctx.clip();
  const sw = W, sh = H; W = w; H = h;
  if (unit.page === "pfd") drawPFD(unit); else drawHSI(unit);
  W = sw; H = sh; ctx.restore();
}

// ---- loop ------------------------------------------------------------------
let prevT = performance.now();
function frame(now) {
  const dt = Math.min(0.1, (now - prevT)/1000); prevT = now;
  HDG_FS = STYLE.hdgFS;   // pick up live style edits
  hitRegions = [];
  noData = (!target.live || (performance.now() - lastData > 2000));
  if (!devFrozen) {   // dev mode freezes all motion so the display can be inspected
  disp.pitch = approach(disp.pitch, target.pitch, dt, 12);
  disp.roll  = approach(disp.roll,  target.roll,  dt, 12);
  disp.ias   = approach(disp.ias,   target.ias,   dt, 8);
  // airspeed trend = predicted change over next 6 s (smoothed accel * 6)
  asiTrend = approach(asiTrend, clamp((target.ias - prevIas) / Math.max(dt, 1e-3) * 6, -40, 40), dt, 2);
  prevIas = target.ias;
  disp.vdef  = approach(disp.vdef,  target.vdef,  dt, 6);
  disp.fdpitch = approach(disp.fdpitch, target.fdpitch, dt, 6);
  disp.fdroll  = approach(disp.fdroll,  target.fdroll,  dt, 6);
  disp.alt   = approach(disp.alt,   target.alt,   dt, 8);
  disp.vsi   = approach(disp.vsi,   target.vsi,   dt, 6);
  disp.slip  = approach(disp.slip,  target.slip,  dt, 8);
  disp.baro  = approach(disp.baro,  target.baro,  dt, 6);
  disp.gs    = approach(disp.gs,    target.gs,    dt, 6);
  disp.turn  = approach(disp.turn,  target.turn,  dt, 6);
  disp.altsel = approach(disp.altsel, target.altsel, dt, 8);
  disp.cdi   = approach(disp.cdi,   target.cdi,   dt, 6);
  disp.dist  = approach(disp.dist,  target.dist,  dt, 6);
  disp.tofrom = target.tofrom;
  disp.hdg    = approachAngle(disp.hdg, target.hdg, dt, 8);
  disp.hdgbug = approachAngle(disp.hdgbug, target.hdgbug, dt, 8);
  disp.trk    = approachAngle(disp.trk, target.trk, dt, 8);
  disp.crs    = approachAngle(disp.crs, target.crs, dt, 8);
  disp.brg    = approachAngle(disp.brg, target.brg, dt, 8);
  }

  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.fillStyle = "#000"; ctx.fillRect(0, 0, RW, RH);
  for (let i = 0; i < units.length; i++) {
    const r = unitRegion(i);
    renderInto(units[i], r.x, r.y, r.w, r.h);
  }
  if (units.length === 2) {
    ctx.strokeStyle = "#000"; ctx.lineWidth = 3;
    const half = Math.round(RH / 2);
    ctx.beginPath(); ctx.moveTo(0, half); ctx.lineTo(RW, half); ctx.stroke();
  }
  W = RW; H = RH;
  for (let i = 0; i < units.length; i++) {
    const r = unitRegion(i);
    drawUnitMenu(units[i], r);
    drawEditDialog(units[i], r);
  }
  if (units.length === 2 && hoverIdx >= 0) drawHover(unitRegion(hoverIdx));
  requestAnimationFrame(frame);
}

// ===== Knob + button input ==================================================
// The real G5 has two operable inputs (power ignored): the knob TURN and the
// knob PRESS. In `both` mode there are TWO independent units stacked (TOP_G5 =
// PFD, BOTTOM_G5 = HSI), each with its own knob/menu state.
//
// Inputs are decoupled from their source. The canonical entry point is
//   g5Input(unitId, action)   action: "cw" | "ccw" | "press"
// Two sources feed it:
//   1. Hardware controller via the ifr-1 bridge (production) — the bridge maps a
//      physical knob to a unit id and calls g5Input (see dispatchBridgeInputs;
//      events ride the existing SSE stream as `_inputs`). [transport TBD]
//   2. Mouse (TESTING ONLY) — scroll wheel = turn, button 1 = press, routed to
//      whichever unit the cursor is hovering over.
//
// Per-unit state machine (docs/01 §1.4–1.5):
//   closed: turn adjusts baro (PFD) / heading bug (HSI); press opens Menu
//   menu:   turn moves cursor; press activates the item
//   edit:   turn changes the value; press accepts (back to menu)
const BEARING = ["None", "GPS", "VLOC"];
function makeUnit(id, page) {
  return { id, page, ui: { mode: "closed", idx: 1, edit: null }, bearingSrc: 1 };
}
// Position-based ids so the bridge mapping is stable regardless of page config.
const units = MODE === "both"
  ? [makeUnit("TOP_G5", "pfd"), makeUnit("BOTTOM_G5", "hsi")]
  : [makeUnit("TOP_G5", MODE)];
const unitById = Object.fromEntries(units.map((u) => [u.id, u]));
let hoverIdx = -1;                                       // unit under cursor (testing aid)

function unitRegion(i) {
  if (units.length === 1) return { x: 0, y: 0, w: RW, h: RH };
  const half = Math.round(RH / 2);
  return i === 0 ? { x: 0, y: 0, w: RW, h: half } : { x: 0, y: half, w: RW, h: RH - half };
}
const unitIndexAt = (py) => (units.length === 1 ? 0 : (py < RH / 2 ? 0 : 1));

function menuItems(u) {
  return u.page === "hsi"
    ? ["Back", "Heading", "Bearing", "PFD"]
    : ["Back", "Heading", "Altitude", "HSI"];
}

const cur = (k) => (override[k] ? target[k] : disp[k]);   // current effective value
function setBaro(d)   { target.baro   = clamp(cur("baro") + d * 0.01, 27.50, 31.50); override.baro = true; }
function setHdgBug(d) { target.hdgbug = ((cur("hdgbug") + d) % 360 + 360) % 360;      override.hdgbug = true; }
function setAltSel(d) { target.altsel = Math.max(0, Math.round(cur("altsel")/100)*100 + d * 100); override.altsel = true; }

function knobTurn(u, dir) {
  const m = u.ui;
  if (m.mode === "closed") { u.page === "hsi" ? setHdgBug(dir) : setBaro(dir); }
  else if (m.mode === "menu") { const n = menuItems(u).length; m.idx = (m.idx + dir + n) % n; }
  else if (m.mode === "edit") { m.edit === "altsel" ? setAltSel(dir) : setHdgBug(dir); }
}
function knobPress(u) {
  const m = u.ui;
  if (m.mode === "closed") { m.mode = "menu"; m.idx = 1; return; }
  if (m.mode === "edit")   { m.mode = "menu"; m.edit = null; return; }
  switch (menuItems(u)[m.idx]) {
    case "Back":     m.mode = "closed"; break;
    case "Heading":  m.mode = "edit"; m.edit = "hdgbug"; break;
    case "Altitude": m.mode = "edit"; m.edit = "altsel"; break;
    case "Bearing":  u.bearingSrc = (u.bearingSrc + 1) % BEARING.length; break;
    case "HSI":      u.page = "hsi"; m.mode = "closed"; break;
    case "PFD":      u.page = "pfd"; m.mode = "closed"; break;
  }
}

// Canonical input API — call this from any source (bridge or mouse).
// unit: a unit id ("TOP_G5"/"BOTTOM_G5") or a numeric index.
function g5Input(unit, action) {
  const u = typeof unit === "number" ? units[unit] : unitById[unit];
  if (!u) return;
  if (action === "press") knobPress(u);
  else if (action === "cw") knobTurn(u, +1);
  else if (action === "ccw") knobTurn(u, -1);
}
window.g5Input = g5Input;   // exposed for the bridge / external controllers

// Bridge inputs delivered over the SSE stream as d._inputs = [{unit, action}].
// No-op until the bridge populates it; keeps the transport in one place.
function dispatchBridgeInputs(d) {
  if (Array.isArray(d && d._inputs)) for (const ev of d._inputs) g5Input(ev.unit, ev.action);
}

// --- mouse source (TESTING ONLY): route by hovered unit ---------------------
let wheelAccum = 0, wheelUnit = -1;
cvs.addEventListener("wheel", (e) => {
  e.preventDefault();
  const i = unitIndexAt(e.clientY);
  if (i !== wheelUnit) { wheelUnit = i; wheelAccum = 0; }  // reset when crossing units
  let dy = e.deltaY; if (e.deltaMode === 1) dy *= 16;      // line mode -> px
  wheelAccum += dy;
  const STEP = 24;            // scroll delta per knob detent (lower = more responsive)
  let detents = 0;
  while (Math.abs(wheelAccum) >= STEP && detents < 4) {    // cap per event to tame momentum
    const dir = wheelAccum > 0 ? 1 : -1; wheelAccum -= dir * STEP; detents++;
    g5Input(i, dir > 0 ? "cw" : "ccw");
  }
  if (detents === 4) wheelAccum = 0;                       // drop leftover from a big flick
}, { passive: false });
cvs.addEventListener("mousedown", (e) => { if (e.button === 0) { e.preventDefault(); g5Input(unitIndexAt(e.clientY), "press"); } });
cvs.addEventListener("mousemove", (e) => {
  hoverIdx = unitIndexAt(e.clientY);
  if (devFrozen) {   // highlight the panel row(s) for the component under the cursor
    let found = null;
    for (let i = hitRegions.length - 1; i >= 0; i--) {
      const r = hitRegions[i];
      if (e.clientX >= r.x && e.clientX <= r.x + r.w && e.clientY >= r.y && e.clientY <= r.y + r.h) { found = r.keys; break; }
    }
    devHighlight(found);
  }
});
cvs.addEventListener("mouseleave", () => { hoverIdx = -1; });
cvs.addEventListener("contextmenu", (e) => e.preventDefault());

function drawUnitMenu(u, reg) {
  if (u.ui.mode !== "menu") return;
  const items = menuItems(u), n = items.length;
  const h = Math.round(clamp(reg.h * 0.16, 44, 84));       // button height
  const pad = 3, gap = 3, y = reg.y + reg.h - h - pad;
  const w = (reg.w - pad * 2) / n, r = Math.max(4, Math.round(h * 0.13));
  ctx.textBaseline = "middle"; ctx.textAlign = "center";
  for (let i = 0; i < n; i++) {
    const bx = reg.x + pad + i * w + gap / 2, bw = w - gap;
    const sel = i === u.ui.idx, label = items[i];
    // glossy dark button (rounded)
    const grad = ctx.createLinearGradient(0, y, 0, y + h);
    grad.addColorStop(0, "#3b3e44"); grad.addColorStop(0.5, "#26282c"); grad.addColorStop(1, "#16181b");
    rrect(bx, y, bw, h, r); ctx.fillStyle = grad; ctx.fill();
    // border: subtle dark normally; thin pale gray-yellow when selected
    rrect(bx, y, bw, h, r);
    ctx.lineWidth = sel ? 2 : 1; ctx.strokeStyle = sel ? "#cdc79c" : "#0a0b0c"; ctx.stroke();
    const cx = bx + bw / 2;
    let val = null;
    if (label === "Heading") { let v = Math.round(((cur("hdgbug")) % 360 + 360) % 360) || 360; val = String(v).padStart(3, "0") + "°"; }
    else if (label === "Altitude") val = String(Math.round(cur("altsel")));
    else if (label === "Bearing")  val = BEARING[u.bearingSrc];
    if (label === "Back") {
      ctx.fillStyle = "#cfe0f2"; ctx.font = `600 ${Math.round(h * 0.32)}px ${FONT}`;
      ctx.fillText("‹ Back", cx, y + h / 2);
    } else if (val !== null) {
      ctx.fillStyle = "#fff"; ctx.font = `600 ${Math.round(h * 0.25)}px ${FONT}`;
      ctx.fillText(label, cx, y + h * 0.33);
      ctx.fillStyle = "#2fd0e8"; ctx.font = `700 ${Math.round(h * 0.30)}px ${FONT}`;
      ctx.fillText(val, cx, y + h * 0.71);
    } else {
      ctx.fillStyle = "#fff"; ctx.font = `600 ${Math.round(h * 0.30)}px ${FONT}`;
      ctx.fillText(label, cx, y + h / 2);
    }
  }
}

// Edit dialog: a centered, taller box at the bottom shown while editing a value
// (heading / altitude / course) — figs 2-12/2-13/2-27/2-28.
const EDIT_TITLE = { hdgbug: "Select Heading", altsel: "Select Altitude", crs: "Localizer Course", obs: "OBS Course" };
function drawEditDialog(u, reg) {
  if (u.ui.mode !== "edit") return;
  const f = u.ui.edit;
  let val;
  if (f === "altsel") val = String(Math.round(cur("altsel")));
  else { let v = Math.round(((cur(f === "hdgbug" ? "hdgbug" : f)) % 360 + 360) % 360) || 360; val = String(v).padStart(3, "0") + "°"; }
  const h = Math.round(clamp(reg.h * 0.22, 64, 130));
  const w = Math.round(clamp(reg.w * 0.48, 150, reg.w - 16));
  const x = reg.x + (reg.w - w) / 2, y = reg.y + reg.h - h - 5;
  const r = Math.max(6, Math.round(h * 0.12));
  const grad = ctx.createLinearGradient(0, y, 0, y + h);
  grad.addColorStop(0, "#23262b"); grad.addColorStop(1, "#0c0e10");
  rrect(x, y, w, h, r); ctx.fillStyle = grad; ctx.fill();
  rrect(x, y, w, h, r); ctx.lineWidth = 2; ctx.strokeStyle = "#5c6066"; ctx.stroke();
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillStyle = "#fff"; ctx.font = `600 ${Math.round(h * 0.23)}px ${FONT}`;
  ctx.fillText(EDIT_TITLE[f] || "Select", x + w / 2, y + h * 0.31);
  ctx.fillStyle = "#2fd0e8"; ctx.font = `700 ${Math.round(h * 0.42)}px ${FONT}`;
  ctx.fillText(val, x + w / 2, y + h * 0.70);
}

// Testing aid: outline the unit currently under the mouse (never shows on a
// touch device since there is no mousemove).
function drawHover(reg) {
  ctx.strokeStyle = "rgba(25,211,255,0.45)"; ctx.lineWidth = 2;
  ctx.strokeRect(reg.x + 1, reg.y + 1, reg.w - 2, reg.h - 2);
}

// ---- developer style panel (press D to toggle, or open with ?dev) ---------
// Live-edit every STYLE value; changes apply immediately and persist in
// localStorage. "Copy JSON" copies the current values (also logged to console)
// so they can be baked in as new defaults.
(function devPanel() {
  const p = document.createElement("div");
  p.style.cssText = "position:fixed;top:0;left:0;max-height:96vh;overflow:auto;z-index:50;"
    + "background:rgba(18,18,22,0.95);color:#dfe3e6;font:12px ui-monospace,Menlo,monospace;"
    + "padding:0 10px 8px;width:248px;display:none;border:1px solid #444;border-radius:4px;";
  let rows = `<div id="g5Drag" style="cursor:move;user-select:none;margin:0 -10px 6px;`
    + `padding:6px 10px;background:#2a2d33;border-radius:3px 3px 0 0">G5 STYLE — drag · D toggles</div>`;
  for (const k in STYLE)
    rows += `<label data-k="${k}" style="display:flex;justify-content:space-between;align-items:center;gap:6px;margin:3px 0;padding:0 2px;border-radius:2px">`
      + `<span>${k}</span><input data-k="${k}" type="number" step="1" value="${STYLE[k]}" `
      + `style="width:66px;background:#000;color:#19d3ff;border:1px solid #555"></label>`;
  rows += `<div style="margin-top:8px;display:flex;gap:6px">`
    + `<button id="g5Reset" style="flex:1">Reset</button>`
    + `<button id="g5Copy" style="flex:1">Copy JSON</button></div>`
    + `<div id="g5Msg" style="opacity:.7;margin-top:6px;min-height:14px"></div>`
    + `<textarea id="g5Json" readonly style="width:100%;height:130px;display:none;`
    + `margin-top:4px;background:#000;color:#9fe6ff;border:1px solid #555;font:11px ui-monospace,monospace"></textarea>`;
  p.innerHTML = rows;
  document.body.appendChild(p);
  devPanelEl = p;
  // initial position (restore saved, else top-right)
  let pos = null; try { pos = JSON.parse(localStorage.getItem("g5panelpos")); } catch (_) {}
  p.style.left = (pos ? pos.x : Math.max(0, window.innerWidth - 258)) + "px";
  p.style.top  = (pos ? pos.y : 0) + "px";
  // drag by the header
  let drag = null;
  p.querySelector("#g5Drag").addEventListener("mousedown", (e) => {
    drag = { x: e.clientX - p.offsetLeft, y: e.clientY - p.offsetTop }; e.preventDefault();
  });
  addEventListener("mousemove", (e) => {
    if (!drag) return;
    p.style.left = (e.clientX - drag.x) + "px"; p.style.top = (e.clientY - drag.y) + "px";
  });
  addEventListener("mouseup", () => {
    if (drag) localStorage.setItem("g5panelpos", JSON.stringify({ x: p.offsetLeft, y: p.offsetTop }));
    drag = null;
  });
  const save = () => { const d = {}; for (const k in STYLE) if (STYLE[k] !== STYLE_DEFAULTS[k]) d[k] = STYLE[k];
    localStorage.setItem("g5style", JSON.stringify(d)); };
  p.addEventListener("input", (e) => { const k = e.target.dataset.k; if (!k) return;
    const v = parseFloat(e.target.value); if (!isNaN(v)) { STYLE[k] = v; save(); } });
  p.querySelector("#g5Reset").onclick = () => { for (const k in STYLE_DEFAULTS) STYLE[k] = STYLE_DEFAULTS[k];
    localStorage.removeItem("g5style"); p.querySelectorAll("input[data-k]").forEach(i => i.value = STYLE[i.dataset.k]); };
  p.querySelector("#g5Copy").onclick = () => {
    const json = JSON.stringify(STYLE, null, 2); console.log(json);
    const ta = p.querySelector("#g5Json");
    ta.style.display = "block"; ta.value = json; ta.focus(); ta.select();
    let ok = false; try { ok = document.execCommand("copy"); } catch (_) {}
    if (!ok && navigator.clipboard) navigator.clipboard.writeText(json).then(() => {}).catch(() => {});
    p.querySelector("#g5Msg").textContent = ok ? "copied — also shown below" : "select text below & ⌘C (also in console)";
  };
  const setVis = (v) => { p.style.display = v ? "block" : "none"; devFrozen = v; if (!v) devHighlight(null); };
  addEventListener("keydown", (e) => {
    if ((e.key === "d" || e.key === "D") && !e.metaKey && !e.ctrlKey) {
      if (e.target && e.target.blur) e.target.blur();   // release a focused field so D always works
      setVis(p.style.display === "none");
    }
  });
  if (/[?&]dev/.test(location.search)) setVis(true);
})();

// ---- wake lock + start -----------------------------------------------------
let wakeLock = null;
async function keepAwake() { try { if ("wakeLock" in navigator) wakeLock = await navigator.wakeLock.request("screen"); } catch(_){} }
document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible") keepAwake(); });
function start() {
  document.getElementById("tap").style.display = "none";
  resize(); keepAwake(); connect();
  // if (cvs.requestFullscreen) cvs.requestFullscreen().catch(()=>{});  // disabled for now
  requestAnimationFrame(frame);
}
document.getElementById("tap").addEventListener("click", start);
if (window.navigator.standalone === true) start();
if (/[?&]auto/.test(location.search)) start();
</script>
